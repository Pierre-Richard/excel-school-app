<div class="sidebar flex flex-column align-items-center">
  <div class="logo flex">
    <div class="logo-icon flex flex-column justify-content-center align-items-center">
      <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
      </svg>
    </div>
    <div class="logo-text flex justify-content-center align-items-center font-bold text-xl">
      <div>Ex<span class="logo-text-color">cel</span></div>
    </div>
  </div>
  <div class="nav">
    <div class="nav-label text-xs mt-6">Principal</div>
    <div class="mt-2">
      <a [routerLink]="'/dashboard'" routerLinkActive="active">
        <p-button icon="pi pi-th-large" aria-label="dashboard" label="Dashboard" />
      </a>
    </div>
    <div class="mt-2">
      <a [routerLink]="'/eleve'" routerLinkActive="active">
        <p-button icon="pi pi-book" aria-label="Eleve" label="Élève" />
      </a>
    </div>
    <div class="mt-2">
      <a [routerLink]="'/login'">
        <p-button icon="pi pi-clone" aria-label="Notes" label="Notes" />
      </a>
    </div>
    <div class="mt-2">
      <a [routerLink]="'/login'">
        <p-button icon="pi pi-calendar" aria-label="Absences" label="Absences" />
      </a>
    </div>
  </div>
  <div class="nav_section">
    <div class="nav_label text-xs mt-6">Communication</div>
    <div class="mt-2">
      <a [routerLink]="'/login'">
        <p-button icon="pi pi pi-comments" aria-label="Messagerie" label="Messagerie" />
      </a>
    </div>
    <div class="mt-2">
      <a [routerLink]="'/login'">
        <p-button icon="pi pi-calendar" aria-label="Emploi du temps" label="Emploi du temps" />
      </a>
    </div>
  </div>
  <div class="avatar flex align-items-center">
    <div>
      <p-avatar
        label="P"
        class="mr-2"
        shape="circle"
        style="background: linear-gradient(135deg, #2a52be, #4ecdc4); color: #ffff"
      />
    </div>
    <div>
      <div class="text-sm font-semibold">{{ username }}</div>
      <div class="role flex justify-content-center text-xs">{{ role }}</div>
    </div>
  </div>
</div>
